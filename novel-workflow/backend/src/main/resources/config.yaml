# 小说 Prompt 工作流配置（API 模式）
# novel / context / project.language 为「新建项目」默认值；每本小说独立配置存 MySQL nw_project，Web 工作流页可改

project:
  default_id: "my_novel"
  language: "zh-CN"

novel:
  scale: "long"
  target_chapters: 80
  chapters_per_volume: 20
  words_per_chapter: 3000

context:
  summary_max_chars: 400
  plot_progress_max_chars: 2000
  prev_chapter_summary_chars: 600

# LLM API（Key / Base URL / Model 仅存 MySQL nw_settings，Web 设置页维护）
# DeepSeek 等前缀缓存：系统消息 + 用户消息「上下文块 → 当前任务」顺序，见 prompts/00_output_format_api.md
api:
  provider: "openai_compatible"   # openai 官方或任意 OpenAI 兼容端点
  base_url_env: "OPENAI_BASE_URL" # 环境变量名，空则使用 OpenAI 默认
  api_key_env: "OPENAI_API_KEY"
  model_env: "NOVEL_LLM_MODEL"    # 可选，未设置则用 model
  model: "gpt-4o"
  temperature: 0.7
  max_tokens: 16384
  timeout_seconds: 300
  # 输出格式：模型须按 FILE 块返回，见 FileBlockParserService
  retry:
    max_attempts: 3
    delay_seconds: 5

workflow:
  setup_stages:
    - era_setting
    - characters
    - worldview
    - relationships
    - main_outline
    - sub_outline
    - foreshadowing
    - material_library
    - style_guide
    - timeline
    - themes_symbols
    - pacing_notes
  writing_stages:
    - chapter_write
    - plot_update
    - chapter_review

files:
  idea: "00_idea.md"
  era: "01_era_setting.md"
  characters: "02_characters.md"
  worldview: "03_worldview.md"
  relationships: "04_relationships.md"
  main_outline: "05_main_outline.md"
  sub_outline: "06_sub_outline.md"
  foreshadowing: "07_foreshadowing.md"
  material: "08_material_library.md"
  style_guide: "11_style_guide.md"
  timeline: "12_timeline.md"
  themes: "13_themes_symbols.md"
  pacing: "14_pacing_notes.md"
  plot_progress: "10_plot_progress.md"
  chapters_dir: "09_chapters"
  meta_dir: "meta"
  summaries_dir: "meta/summaries"
  state: "meta/workflow_state.json"
  context_index: "meta/context_index.md"
