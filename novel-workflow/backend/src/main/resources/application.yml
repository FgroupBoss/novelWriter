server:
  port: 8080

spring:
  application:
    name: novel-writer
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:novel_writer}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    default-property-inclusion: non_null

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

novel:
  default-target-chapters: 80
  import-demo-path: ${NOVEL_IMPORT_DEMO_PATH:}
  llm:
    temperature: 0.7
    max-tokens: 16384
    timeout-seconds: 300
    retry-max: 3
    retry-delay-seconds: 5

logging:
  level:
    com.novelwriter: INFO
