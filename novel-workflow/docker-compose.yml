services:
  mysql:
    image: mysql:8.0
    container_name: novel-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-novel_writer}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root123456}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: novel-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-novel_writer}
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      NOVEL_IMPORT_DEMO_PATH: /data/demo_novel
      TZ: Asia/Shanghai
    volumes:
      - ./projects/demo_novel:/data/demo_novel:ro
    expose:
      - "8080"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: novel-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-8765}:80"

volumes:
  mysql_data:
    driver: local
